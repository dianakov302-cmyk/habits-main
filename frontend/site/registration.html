<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Anaida Space</title>
  <meta name="description" content="Register or log in to your Anaida Space account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Dancing+Script:wght@700&family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
    html, body {
      height: 100%;
      overflow: auto;
      background: #0d0d1a;
    }

    /* ══ PAGE LAYOUT ══ */
    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #0d0d1a;
      padding: 0;
    }

    /* ══ LEFT PANEL — cosmos hero ══ */
    .auth-left {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 48px;
      min-height: 100vh;
    }
    .auth-left-bg {
      position: absolute;
      inset: 0;
      background-image: url('/img/cosmos_1720778025.jpeg');
      background-size: cover;
      background-position: center;
    }
    .auth-left-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(13,13,26,.25) 0%, rgba(13,13,26,.7) 100%),
        radial-gradient(ellipse at 30% 60%, rgba(139,92,246,.15) 0%, transparent 60%);
    }
    .auth-left-content {
      position: relative;
      z-index: 2;
    }
    .auth-left-brand {
      position: absolute;
      top: 48px;
      left: 48px;
      z-index: 3;
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #c4b5fd, #8b5cf6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }
    .auth-left-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      color: rgba(255,255,255,.9);
      line-height: 1.25;
      margin-bottom: 16px;
    }
    .auth-left-sub {
      font-family: 'Outfit', sans-serif;
      font-size: .92rem;
      color: rgba(255,255,255,.5);
      line-height: 1.7;
      max-width: 340px;
    }
    .auth-left-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 28px;
      font-family: 'Outfit', sans-serif;
      font-size: .84rem;
      color: rgba(255,255,255,.45);
      text-decoration: none;
      transition: color .2s;
    }
    .auth-left-back:hover { color: rgba(255,255,255,.75); }
    .auth-left-back svg { width: 14px; height: 14px; }

    /* ══ RIGHT PANEL — form ══ */
    .auth-right {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      background: #0d0d1a;
      overflow: hidden;
    }
    .auth-right::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('/img/cosmos_840327049.jpeg');
      background-size: cover;
      background-position: center;
      opacity: .04;
    }
    .auth-right::after {
      content: '';
      position: absolute;
      top: -20%; left: -20%;
      width: 60%; height: 60%;
      background: radial-gradient(ellipse, rgba(139,92,246,.08) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ══ FORM CARD ══ */
    .auth-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 36px 32px 32px;
      box-shadow:
        0 24px 64px rgba(0,0,0,.45),
        0 0 0 1px rgba(139,92,246,.06);
    }

    /* Mobile brand shown only on small screens */
    .auth-mobile-brand {
      display: none;
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #c4b5fd, #8b5cf6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ══ AUTH TABS ══ */
    .auth-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      background: rgba(255,255,255,.05);
      border-radius: 14px;
      padding: 4px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.4);
      font-family: 'Outfit', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s, color .2s, box-shadow .2s;
    }
    .auth-tab--active {
      background: #8b5cf6;
      color: #fff;
      box-shadow: 0 2px 12px rgba(139,92,246,.4);
    }
    .auth-tab:not(.auth-tab--active):hover {
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.7);
    }
    .auth-tab:focus-visible {
      outline: 2px solid rgba(139,92,246,.6);
      outline-offset: 2px;
    }

    /* ══ PANELS ══ */
    .auth-panel { display: none; }
    .auth-panel--active { display: block; }

    /* ══ PANEL HEADINGS ══ */
    .auth-card h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #f8fafc;
      margin-bottom: 6px;
    }
    .auth-card > .auth-panel > p,
    .auth-card .auth-panel > p {
      font-family: 'Outfit', sans-serif;
      font-size: .88rem;
      color: rgba(255,255,255,.45);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* ══ FORM ══ */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .auth-field label {
      font-family: 'Outfit', sans-serif;
      font-size: .78rem;
      font-weight: 500;
      color: rgba(255,255,255,.55);
      letter-spacing: .3px;
    }
    .auth-field input {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 13px 16px;
      color: #f8fafc;
      font-family: 'Outfit', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .auth-field input::placeholder { color: rgba(255,255,255,.25); }
    .auth-field input:hover { border-color: rgba(255,255,255,.18); }
    .auth-field input:focus {
      border-color: rgba(139,92,246,.7);
      background: rgba(139,92,246,.06);
      box-shadow: 0 0 0 3px rgba(139,92,246,.15);
    }

    /* ══ SUBMIT ══ */
    .auth-actions { margin-top: 8px; }
    .auth-submit {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      color: #fff;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      cursor: pointer;
      transition: transform .22s, box-shadow .22s, opacity .2s;
      box-shadow: 0 4px 20px rgba(139,92,246,.35);
    }
    .auth-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139,92,246,.5);
    }
    .auth-submit:active { transform: translateY(0); opacity: .9; }

    /* ══ MESSAGE ══ */
    .auth-message {
      margin-top: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: .88rem;
      color: #10b981;
      min-height: 1.2em;
      line-height: 1.5;
    }
    #loginMessage {
      margin-top: 14px;
      font-size: .88rem;
      min-height: 1.2em;
    }

    /* ══ DIVIDER ══ */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0 18px;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.08);
    }
    .auth-divider span {
      font-family: 'Space Mono', monospace;
      font-size: .62rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,.28);
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 900px) {
      .auth-page {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .auth-left { display: none; }
      .auth-right {
        padding: 48px 24px 64px;
        min-height: 100vh;
      }
      .auth-mobile-brand { display: block; }
    }
    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px 24px; border-radius: 20px; }
    }
  </style>
</head>
<body data-page="registration">

  <main class="auth-page">

    <!-- ══ LEFT: Cosmos hero ══ -->
    <section class="auth-left">
      <div class="auth-left-bg"></div>
      <a href="index.html" class="auth-left-brand">ANAIDA SPACE</a>
      <div class="auth-left-content">
        <p class="auth-left-tagline">
          Discipline is<br>not a feeling.<br>It's a system.
        </p>
        <p class="auth-left-sub">
          Build your identity through intelligent habits, daily protocols, and 30-day adaptive programs.
        </p>
        <a href="index.html" class="auth-left-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back to home
        </a>
      </div>
    </section>

    <!-- ══ RIGHT: Form ══ -->
    <section class="auth-right">
      <div class="auth-card">

        <!-- Mobile-only brand -->
        <div class="auth-mobile-brand">ANAIDA SPACE</div>

        <!-- Tab bar — IDs kept exactly as JS expects -->
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab auth-tab--active" id="tabRegister" role="tab" aria-selected="true" aria-controls="panelRegister">Register</button>
          <button class="auth-tab" id="tabLogin" role="tab" aria-selected="false" aria-controls="panelLogin">Sign In</button>
        </div>

        <!-- REGISTER panel — ID kept exactly as JS expects -->
        <div class="auth-panel auth-panel--active" id="panelRegister" role="tabpanel">
          <h2>Create account</h2>
          <p>Fill in your details to begin your journey.</p>

          <form class="auth-form" id="registrationForm" novalidate>
            <div class="auth-field">
              <label for="regName">Name</label>
              <input type="text" id="regName" name="name" placeholder="Your name" autocomplete="name" required>
            </div>
            <div class="auth-field">
              <label for="regEmail">Email</label>
              <input type="email" id="regEmail" name="email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="auth-field">
              <label for="regPassword">Password</label>
              <input type="password" id="regPassword" name="password" placeholder="Create a password (min 6 chars)" autocomplete="new-password" required>
            </div>
            <div class="auth-field">
              <label for="regPasswordConfirm">Confirm password</label>
              <input type="password" id="regPasswordConfirm" name="passwordConfirm" placeholder="Repeat your password" autocomplete="new-password" required>
            </div>
            <div class="auth-actions">
              <button type="submit" class="auth-submit">Create Account</button>
            </div>
            <div class="auth-message" id="registrationMessage" aria-live="polite"></div>
          </form>
        </div>

        <!-- LOGIN panel — ID kept exactly as JS expects -->
        <div class="auth-panel" id="panelLogin" role="tabpanel">
          <h2>Welcome back</h2>
          <p>Sign in to continue your journey.</p>

          <form class="auth-form" id="loginForm" novalidate>
            <div class="auth-field">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" name="email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="auth-field">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" name="password" placeholder="Your password" autocomplete="current-password" required>
            </div>
            <div class="auth-actions">
              <button type="submit" class="auth-submit">Sign In</button>
            </div>
            <div class="auth-message" id="loginMessage" aria-live="polite"></div>
          </form>
        </div>

      </div>
    </section>

  </main>

  <script type="module" src="js/app.js?v=4"></script>
  <script type="module">
    import { apiRequest, USER_EMAIL_KEY, setToken } from './js/modules/api.js?v=2';

    const form = document.getElementById('registrationForm');
    const messageEl = document.getElementById('registrationMessage');

    function setMessage(message, isError = false) {
      if (!messageEl) return;
      messageEl.textContent = message || '';
      messageEl.style.color = isError ? '#ff7a7a' : '#8ef0b3';
    }

    if (form) {
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        event.stopImmediatePropagation();
        setMessage('');

        const formData = new FormData(form);
        const name = String(formData.get('name') || '').trim();
        const email = String(formData.get('email') || '').trim().toLowerCase();
        const password = String(formData.get('password') || '');
        const passwordConfirm = String(formData.get('passwordConfirm') || '');

        if (!name) return setMessage('Please enter your name.', true);
        if (!email) return setMessage('Please enter your email.', true);
        if (password.length < 6) {
          return setMessage('Password must be at least 6 characters.', true);
        }
        if (password !== passwordConfirm) {
          return setMessage('Passwords do not match.', true);
        }

        try {
          const data = await apiRequest('/users/register', {
            method: 'POST',
            body: JSON.stringify({ name, email, password }),
          });

          if (data?.status !== 'success') {
            throw new Error(data?.message || 'Registration failed.');
          }

          localStorage.setItem(
            'anaida_registration',
            JSON.stringify({ name, email, registeredAt: new Date().toISOString() }),
          );
          setToken(data.access_token);
          localStorage.setItem(USER_EMAIL_KEY, data.email || email);

          setMessage('Registration successful! Opening the test...');

          window.location.replace('test.html');
        } catch (error) {
          setMessage(error.message || 'Registration failed.', true);
        }
      }, true);
    }
  </script>
</body>
</html>
